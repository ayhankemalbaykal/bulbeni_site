<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulbeni</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #94a3b8;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        .button:hover {
            background: #2563eb;
        }

        .card {
            margin-top: 40px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bulbeni 🚀</h1>
    <p>İlk modern web sitem yayında</p>

    <a href="#" class="button">Başla</a>

    <div class="card">
        <h3>Deploy Başarılı 🎉</h3>
        <p>Bu site Vercel üzerinde çalışıyor.</p>
    </div>
</div>

</body>
</html>
